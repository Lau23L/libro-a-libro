<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Libro a Libro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>📚 Libro a Libro</h1>
    <p>Compra, vende o intercambia libros usados en Mar del Plata</p>
</header>

<button id="publicarBtn">➕ Publicar libro</button>
<div id="formularioLibro" style="display:none;">
  <h2>Publicar un libro</h2>

  <input id="titulo" type="text" placeholder="Título del libro"><br>
  <input id="autor" type="text" placeholder="Autor"><br>
  <input id="genero" type="text" placeholder="Género"><br>
  <textarea id="descripcion" placeholder="Descripción"></textarea><br>

  <input id="precio" type="number" placeholder="Precio en pesos">

  <label>
  <input id="intercambio" type="checkbox">
  Disponible para intercambio
  </label>


  <button id="guardarLibro">Publicar</button>
</div>


<div id="listaLibros"></div>

<div class="search-container">
<input type="text" id="searchInput" placeholder="Buscar por título o autor...">
</div>

<main>

<h2>Libros disponibles</h2>

<div class="book-list">
</div>

</main>

<script src="script.js"></script>

<script>

const boton = document.getElementById("publicarBtn")
const formulario = document.getElementById("formularioLibro")

boton.addEventListener("click", function() {

  if (formulario.style.display === "none") {
    formulario.style.display = "block"
  } else {
    formulario.style.display = "none"
  }

})

</script>

<script>

const guardarBtn = document.getElementById("guardarLibro")

guardarBtn.addEventListener("click", function() {

  const titulo = document.getElementById("titulo").value
  const autor = document.getElementById("autor").value
  const genero = document.getElementById("genero").value
  const descripcion = document.getElementById("descripcion").value

  const lista = document.getElementById("listaLibros")

  const nuevoLibro = document.createElement("div")

  nuevoLibro.innerHTML = `
    <h3>${titulo}</h3>
    <p><strong>Autor:</strong> ${autor}</p>
    <p><strong>Género:</strong> ${genero}</p>
    <p>${descripcion}</p>
    <hr>
  `

  lista.appendChild(nuevoLibro)

})

</script>

</body>
</html>
