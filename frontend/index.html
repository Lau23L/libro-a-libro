<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Libro a Libro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>📚 Libro a Libro</h1>
    <p>Compra, vende o intercambia libros usados en Mar del Plata</p>
</header>

<button id="publicarBtn">Publicar libro</button>
<div id="formularioLibro" style="display:none;">
  <h2>Publicar un libro</h2>

  <input type="text" placeholder="Título del libro"><br>
  <input type="text" placeholder="Autor"><br>
  <input type="text" placeholder="Género"><br>
  <textarea placeholder="Descripción"></textarea><br>

  <button>Publicar</button>
</div>

<div class="search-container">
<input type="text" id="searchInput" placeholder="Buscar por título o autor...">
</div>

<main>

<h2>Libros disponibles</h2>

<div class="book-list">
</div>

</main>

<script src="script.js"></script>

<script>

const boton = document.getElementById("publicarBtn")
const formulario = document.getElementById("formularioLibro")

boton.addEventListener("click", function() {

  if (formulario.style.display === "none") {
    formulario.style.display = "block"
  } else {
    formulario.style.display = "none"
  }

})

</script>

</body>
</html>
