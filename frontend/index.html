<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Libro a Libro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

<header class="header">

  <div class="header-top">
    <h1>Libro a Libro</h1>
  </div>

  <div class="user-info">

  <span id="usuarioNombre"></span>

  <button id="verMensajesBtn" class="contact-btn" style="background-color: #b8a28c;">
    📬 Mis Mensajes
  </button>

  <button id="logoutBtn" style="background-color: #a67c52;">Cerrar sesión</button>

  </div>

  <div class="header-controls">

    <input type="text" id="searchInput" placeholder="Buscar por título o autor...">

    <button id="publicarBtn">Publicar libro</button>

  </div>

</header>

<div id="formularioModal" class="modal">

  <div class="modal-content">
    <span class="cerrar">&times;</span>

    <h2>Publicar un libro</h2>

    <div class="input-group">
      <i class="fa-solid fa-book"></i>
      <input id="titulo" type="text" placeholder="Título del libro">
    </div>

    <div class="input-group">
      <i class="fa-solid fa-user-pen"></i>
      <input id="autor" type="text" placeholder="Autor">
    </div>

    <div class="input-group">
      <i class="fa-solid fa-tags"></i>
      <select id="genero">
        <option value="">Seleccionar género</option>
        <option value="Novela">Novela</option>
        <option value="Fantasía">Fantasía</option>
        <option value="Ciencia ficción">Ciencia ficción</option>
        <option value="Terror">Terror</option>
        <option value="Romance">Romance</option>
        <option value="Historia">Historia</option>
        <option value="Autoayuda">Autoayuda</option>
        <option value="Infantil">Infantil</option>
        <option value="Educativo">Educativo</option>
      </select>
    </div>

    <div class="input-group">
      <i class="fa-solid fa-align-left" style="top: 20px;"></i> <textarea id="descripcion" placeholder="Descripción"></textarea>
    </div>

    <div class="input-group">
      <i class="fa-solid fa-hand-holding-dollar"></i>
      <input id="precio" type="number" placeholder="Precio en pesos">
    </div>

    <div class="input-group-file">
      <label for="imagenLibro"><i class="fa-solid fa-image"></i> Imagen del libro</label>
      <input type="file" id="imagenLibro" accept="image/*">
    </div>

    <label class="checkbox-container">
      <input id="intercambio" type="checkbox">
      <span>Disponible para intercambio</span>
    </label>

    <button id="guardarLibro">Publicar Libro</button>
  </div>

</div>

<div id="buzonModal" class="modal">
    <div class="modal-content" style="max-width: 500px;">
        <span class="cerrar-buzon cerrar">&times;</span>
        <h2 style="font-family: 'Playfair Display', serif;">Mi Buzón de Mensajes</h2>
        <div id="listaMensajes" style="max-height: 400px; overflow-y: auto;">
            </div>
    </div>
</div>

    
<div id="listaLibros"></div>

<main>

<h2>Libros disponibles</h2>

<div class="book-list">
</div>

<div id="mensajeModal" class="modal">
  <div class="modal-content">
    <span class="cerrar-mensaje cerrar">&times;</span>
    <h2 id="mensajeTitulo">Enviar mensaje</h2>
    <textarea id="textoMensaje" placeholder="Hola! Me interesa tu libro..."></textarea>
    <button id="enviarMensajeBtn">Enviar Mensaje</button>
  </div>
</div>

</main>


<script src="script.js"></script>
</body>
</html>
